<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:#0c0f12;font-family:'Public Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;user-select:none}
:root{--bg:#eef1f3;--surface:#ffffff;--surface-2:#f6f8f9;--border:#e3e7ea;--text:#13181c;--muted:#646e76;--faint:#9aa4ab;--accent:#10b981;--accent-ink:#0a8f63;--accent-soft:#e6f6ef;--down:#ef4444;--warn:#f59e0b;--paused:#9aa4ab;--shadow:rgba(15,23,30,.07)}
[data-theme="dark"]{--bg:#0b0e11;--surface:#15191d;--surface-2:#1a2025;--border:#272e34;--text:#e6eaed;--muted:#9aa3aa;--faint:#5d666d;--accent-ink:#34d399;--accent-soft:#10271f;--down:#f87171;--warn:#fbbf24;--paused:#5d666d;--shadow:rgba(0,0,0,.5)}
.ms{font-family:'Material Symbols Rounded';font-weight:400;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;white-space:nowrap;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased;display:inline-block}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--faint);background-clip:content-box}
input,select,button,textarea{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}
button{font:inherit}
.rz{position:fixed;z-index:9000}
.rz-t{top:0;left:8px;right:8px;height:5px;cursor:ns-resize}.rz-b{bottom:0;left:8px;right:8px;height:5px;cursor:ns-resize}
.rz-l{left:0;top:8px;bottom:8px;width:5px;cursor:ew-resize}.rz-r{right:0;top:8px;bottom:8px;width:5px;cursor:ew-resize}
.rz-tl{top:0;left:0;width:9px;height:9px;cursor:nwse-resize}.rz-tr{top:0;right:0;width:9px;height:9px;cursor:nesw-resize}
.rz-bl{bottom:0;left:0;width:9px;height:9px;cursor:nesw-resize}.rz-br{bottom:0;right:0;width:9px;height:9px;cursor:nwse-resize}
body.max .rz{display:none}
.winbtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;border:0;background:transparent;color:var(--muted);cursor:pointer;transition:background .16s ease,color .16s ease}
.winbtn:hover{background:var(--surface-2);color:var(--text)}
.winbtn.cl:hover{background:var(--down);color:#fff}
.rowact{display:flex;gap:4px;justify-content:flex-end;opacity:0;transform:translateX(4px);transition:opacity .18s ease,transform .18s ease}
.trow{transition:background .16s ease,opacity .16s ease}
.trow:hover .rowact{opacity:1;transform:translateX(0)}
.trow:hover{background:var(--surface-2)}
.iconbtn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted);cursor:pointer;transition:color .16s ease,border-color .16s ease,background .16s ease,transform .1s ease}
.iconbtn:hover{color:var(--text);border-color:var(--faint)}
.iconbtn:active{transform:scale(.92)}
.iconbtn.dz:hover{color:var(--down);border-color:var(--down)}
.navbtn{transition:background .16s ease,color .16s ease,filter .16s ease}
.navbtn:hover{filter:brightness(1.04)}
.btnp,.btns{transition:filter .16s ease,transform .1s ease,box-shadow .16s ease}
.btnp:hover,.btns:hover{filter:brightness(1.05)}
.btnp:active,.btns:active{transform:translateY(1px)}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#scroller.sect-change>*{animation:fadeUp .22s ease both}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:10000;padding:24px}
.ov.show{display:flex;animation:ovIn .18s ease}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:580px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.4);animation:modalIn .2s cubic-bezier(.2,.8,.25,1)}
.modal .mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal .mb{padding:18px 22px;overflow:auto}
.modal .mf{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}
.fld{display:flex;flex-direction:column;gap:6px;margin-bottom:13px}
.fld>span{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
.fld input,.fld select,.fld textarea{height:38px;padding:0 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2);color:var(--text);font-size:13px}
.fld textarea{height:auto;padding:9px 12px;min-height:54px;resize:vertical;font-family:inherit}
.fld.mono input{font-family:'JetBrains Mono',monospace;font-size:12.5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.hidden{display:none!important}
.tg{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 13px;border:1px solid var(--border);border-radius:11px;background:var(--surface-2);cursor:pointer;text-align:left;width:100%}
.tgk{width:38px;height:22px;border-radius:999px;position:relative;flex:0 0 auto;transition:background .15s}
.tgk>i{position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.35);transition:left .15s}
.btnp{display:flex;align-items:center;gap:7px;height:40px;padding:0 18px;border:0;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:600;box-shadow:0 2px 8px color-mix(in srgb,var(--accent) 40%,transparent)}
.btns{display:flex;align-items:center;gap:7px;height:40px;padding:0 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-weight:600}
#toast{position:fixed;bottom:42px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:all .22s;z-index:11000;display:flex;align-items:center;gap:9px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--down)}#toast.err .ms{color:var(--down)}#toast.ok .ms{color:var(--accent-ink)}
</style>
</head>

const TITLES={allgemein:["Übersicht","Alle Monitore auf einen Blick"],ping:["Ping-Checks","Erreichbarkeit lokaler Hosts"],tcp:["TCP-Checks","Offene Ports & Endpunkte"],service:["Windows-Dienste","Status der überwachten Dienste"],drive:["Laufwerke","Speicherplatz & Verfügbarkeit"],logs:["Logs","Ereignisprotokoll des Agents"],settings:["Einstellungen","Globale Konfiguration & Watchdog"]};
const SECT={up:{txt:"OK",dot:"var(--accent)",soft:"color-mix(in srgb,var(--accent) 14%,transparent)",fg:"var(--accent-ink)"},down:{txt:"Down",dot:"var(--down)",soft:"color-mix(in srgb,var(--down) 14%,transparent)",fg:"var(--down)"},warning:{txt:"Langsam",dot:"var(--warn)",soft:"color-mix(in srgb,var(--warn) 16%,transparent)",fg:"var(--warn)"},unknown:{txt:"Unbekannt",dot:"var(--faint)",soft:"color-mix(in srgb,var(--faint) 14%,transparent)",fg:"var(--muted)"},disabled:{txt:"Aus",dot:"var(--paused)",soft:"color-mix(in srgb,var(--paused) 14%,transparent)",fg:"var(--muted)"}};

function theme(){return S.theme==="dark"?"dark":"light";}
function monActive(){return !!S.monitoringActive;}
function monDot(){return monActive()?"var(--accent)":"var(--paused)";}
function monLabel(){return monActive()?"Monitoring aktiv":"Monitoring pausiert";}

function sectionList(){
  const sec=ui.section;
  let list=S.monitors||[];
  if(sec==="ping")list=list.filter(m=>m.type==="ping");
  else if(sec==="tcp")list=list.filter(m=>m.type==="tcp");
  else if(sec==="service")list=list.filter(m=>m.type==="service");
  else if(sec==="drive")list=list.filter(m=>m.type==="drive");
  const q=ui.query.trim().toLowerCase();
  if(q)list=list.filter(m=>(m.name||"").toLowerCase().includes(q)||(m.target||"").toLowerCase().includes(q)||(m.lastError||"").toLowerCase().includes(q));
  if(sec==="allgemein"&&ui.filter!=="all")list=list.filter(m=>m.state===ui.filter);
  return list;
}

let lastSection=null;
function render(){
  document.documentElement.setAttribute("data-theme",theme());
  const root=document.getElementById("root");
  const sec=ui.section,k=S.kpi||{};
  // Preserve the scroll position across re-renders of the same section so live updates
  // (e.g. new log lines) don't yank the view back to the top.
  const prevScroller=document.getElementById("scroller");
  const prevScroll=prevScroller?prevScroller.scrollTop:0;
  const sectionChanged=lastSection!==sec;
  const accentSoft="color-mix(in srgb,var(--accent) 14%,transparent)";
  const navCount=t=>(S.monitors||[]).filter(m=>m.type===t).length;
  const counts={allgemein:(S.monitors||[]).length,ping:navCount("ping"),tcp:navCount("tcp"),service:navCount("service"),drive:navCount("drive"),logs:"",settings:""};

  // nav buttons
  const navBtns=(mode)=>NAV.map(([id,label,icon])=>{
    const a=id===sec,fill=a?1:0;
    if(mode==="side")return `<button class="navbtn" data-nav="${id}" style="display:flex;align-items:center;gap:12px;width:100%;padding:9px 12px;margin-bottom:2px;border:0;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:600;text-align:left;background:${a?'var(--accent-soft)':'transparent'};color:${a?'var(--accent-ink)':'var(--muted)'}">${ic(icon,20,"font-variation-settings:'FILL' "+fill)}<span style="flex:1">${label}</span><span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--faint)">${counts[id]}</span></button>`;
    return `<button class="navbtn" data-nav="${id}" style="display:flex;align-items:center;gap:8px;padding:14px 14px 12px;border:0;border-bottom:2px solid ${a?'var(--accent)':'transparent'};background:none;cursor:pointer;font-size:13.5px;font-weight:600;color:${a?'var(--text)':'var(--muted)'};white-space:nowrap">${ic(icon,19,"font-variation-settings:'FILL' "+fill)}${label}</button>`;
  }).join("");

  let body="";
  if(sec==="logs")body=renderLogs();
  else if(sec==="settings")body=renderSettings();
  else body=renderMonitors(sec,k);

  root.innerHTML=`
  <div style="--accent-soft:${accentSoft};position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-size:14px">
    <div id="titlebar" style="height:46px;flex:0 0 46px;display:flex;align-items:center;gap:11px;padding:0 10px 0 14px;background:var(--surface);border-bottom:1px solid var(--border);z-index:5">
      <span style="width:22px;height:22px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 6px color-mix(in srgb,var(--accent) 45%,transparent)">${ic("monitor_heart",15,"font-variation-settings:'FILL' 1")}</span>
      <span style="font-size:13.5px;font-weight:600;letter-spacing:-.01em">Uptime Kuma Agent</span>
      <span style="font-size:12px;color:var(--faint);font-family:'JetBrains Mono',monospace">${E(S.machineName||"")} · v${E(S.version||"")}</span>
      <div style="flex:1"></div>
      <div data-nodrag style="display:flex;gap:3px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:3px">
        <button data-layout="sidebar" title="Sidebar-Layout" style="display:flex;align-items:center;gap:6px;border:0;border-radius:7px;padding:5px 10px;cursor:pointer;font-size:12px;font-weight:600;background:${ui.layout==='sidebar'?'var(--accent)':'transparent'};color:${ui.layout==='sidebar'?'#fff':'var(--muted)'}">${ic("side_navigation",17)}Sidebar</button>
        <button data-layout="topbar" title="Tab-Layout" style="display:flex;align-items:center;gap:6px;border:0;border-radius:7px;padding:5px 10px;cursor:pointer;font-size:12px;font-weight:600;background:${ui.layout==='topbar'?'var(--accent)':'transparent'};color:${ui.layout==='topbar'?'#fff':'var(--muted)'}">${ic("toolbar",17)}Tabs</button>
      </div>
      <button data-nodrag id="btnTheme" title="Light / Dark" style="width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:9px;background:var(--surface-2);color:var(--text);cursor:pointer">${ic(theme()==='dark'?'light_mode':'dark_mode',19)}</button>
      <div data-nodrag style="display:flex;align-items:center;gap:1px;margin-left:6px">
        <button class="winbtn" id="btnMin" title="Minimieren">${ic("remove",18)}</button>
        <button class="winbtn" id="btnMax" title="Maximieren">${ic("crop_square",15)}</button>
        <button class="winbtn cl" id="btnClose" title="Schließen">${ic("close",18)}</button>
      </div>
    </div>

    <div style="flex:1;display:flex;min-height:0">
      ${ui.layout==='sidebar'?`<nav style="flex:0 0 244px;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);padding:16px 14px">
        <div style="display:flex;align-items:center;gap:11px;padding:8px 10px 16px">
          <span style="position:relative;width:38px;height:38px;border-radius:11px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent-ink)">${ic("dns",21,"font-variation-settings:'FILL' 1")}<span style="position:absolute;right:-2px;bottom:-2px;width:12px;height:12px;border-radius:50%;background:${monDot()};border:2.5px solid var(--surface)"></span></span>
          <div style="min-width:0"><div style="font-size:13px;font-weight:700;line-height:1.2">${E(S.machineName||"")}</div><div style="font-size:11.5px;color:var(--muted);font-family:'JetBrains Mono',monospace">${monLabel()}</div></div>
        </div>
        <div style="font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);padding:6px 12px 8px">Navigation</div>
        ${navBtns("side")}
        <div style="flex:1"></div>
        <div style="border:1px solid var(--border);border-radius:12px;padding:13px;background:var(--surface-2)">
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;margin-bottom:4px">${ic("schedule",17,"color:var(--accent-ink)")}Letzter Lauf</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)">${E(S.lastRun||"—")}</div>
        </div>
      </nav>`:""}

      <div style="flex:1;display:flex;flex-direction:column;min-width:0">
        ${ui.layout==='topbar'?`<div style="display:flex;align-items:center;gap:2px;padding:0 18px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto">${navBtns("top")}</div>`:""}
        <div style="display:flex;align-items:center;gap:16px;padding:18px 28px;background:var(--surface);border-bottom:1px solid var(--border)">
          <div style="min-width:0"><h1 style="margin:0;font-size:19px;font-weight:700;letter-spacing:-.02em">${E(TITLES[sec][0])}</h1><p style="margin:3px 0 0;font-size:13px;color:var(--muted)">${E(TITLES[sec][1])}</p></div>
          <div style="flex:1"></div>
          ${sec!=='logs'&&sec!=='settings'?`<div style="display:flex;align-items:center;gap:8px;width:240px;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)">${ic("search",18,"color:var(--faint)")}<input id="search" value="${E(ui.query)}" placeholder="Monitore suchen…" style="flex:1;border:0;background:none;color:var(--text);font-size:13px;min-width:0"></div>`:""}
          <button id="btnMon" style="display:flex;align-items:center;gap:8px;height:38px;padding:0 14px;border:1px solid var(--border);border-radius:10px;background:var(--surface);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text)"><span style="width:8px;height:8px;border-radius:50%;background:${monDot()};box-shadow:0 0 0 4px color-mix(in srgb,${monDot()} 22%,transparent)"></span>${monLabel()}</button>
          ${sec!=='logs'&&sec!=='settings'?`<button id="btnAdd" style="display:flex;align-items:center;gap:7px;height:38px;padding:0 14px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);cursor:pointer;font-size:12.5px;font-weight:600">${ic("add",18)}Hinzufügen</button>`:""}
          <button id="btnTest" style="display:flex;align-items:center;gap:7px;height:38px;padding:0 16px;border:0;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer;font-size:12.5px;font-weight:600;box-shadow:0 2px 8px color-mix(in srgb,var(--accent) 40%,transparent)">${ic("play_arrow",18)}Testlauf</button>
        </div>
        <div id="scroller" style="flex:1;overflow:auto;padding:24px 28px 40px">${body}</div>
      </div>
    </div>

    <div style="height:30px;flex:0 0 30px;display:flex;align-items:center;gap:14px;padding:0 16px;background:var(--surface);border-top:1px solid var(--border);font-size:11.5px;color:var(--muted)">
      <span style="display:flex;align-items:center;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:${monDot()}"></span>${monLabel()}</span>
      <span style="color:var(--border)">|</span>
      <span style="font-family:'JetBrains Mono',monospace">${k.up||0} OK · ${k.down||0} Down</span>
      <div style="flex:1"></div>
      <span style="font-family:'JetBrains Mono',monospace">${E(S.lastError?("Fehler: "+S.lastError):"Bereit")}</span>
    </div>
  </div>`;
  const sc=document.getElementById("scroller");
  if(sc){
    if(sectionChanged){sc.classList.add("sect-change");}
    else{sc.scrollTop=prevScroll;}
  }
  lastSection=sec;
  wire();
}

function renderMonitors(sec,k){
  let html="";
  if(sec==="allgemein"){
    const up=k.up||0,down=k.down||0,warn=k.warn||0;
    const spark=(S.spark&&S.spark.length?S.spark:[]).map(h=>`<span style="flex:1;height:${h}%;background:var(--accent);opacity:.85;border-radius:2px"></span>`).join("");
    html+=`<div style="display:grid;grid-template-columns:repeat(4,1fr) 1.3fr;gap:14px;margin-bottom:18px">
      ${kpiCard("lan","Monitore",k.total||0,"aktiv überwacht","var(--text)","var(--faint)")}
      ${kpiCard("check_circle","Erreichbar",up,(k.uptime||"0%")+" Verfügbarkeit","var(--accent-ink)","var(--accent-ink)")}
      ${kpiCard("error","Ausfälle",down,"brauchen Aufmerksamkeit","var(--down)","var(--down)")}
      ${kpiCard("bolt","Ø Antwort",(k.avg||"—"),"Push an Uptime Kuma","var(--text)","var(--faint)")}
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px var(--shadow);display:flex;flex-direction:column">
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--muted)"><span style="display:flex;align-items:center;gap:8px">${ic("show_chart",18,"color:var(--faint)")}Kuma-Antwortzeit</span></div>
        <div style="flex:1;display:flex;align-items:flex-end;gap:3px;margin-top:14px;min-height:48px">${spark||'<span style="color:var(--faint);font-size:11.5px">keine Daten</span>'}</div>
      </div></div>`;
    if(S.lastError){
      html+=`<div style="display:flex;align-items:flex-start;gap:12px;padding:14px 16px;margin-bottom:18px;border:1px solid color-mix(in srgb,var(--down) 35%,var(--border));border-radius:13px;background:color-mix(in srgb,var(--down) 9%,var(--surface))">
        ${ic("report",21,"color:var(--down);margin-top:1px")}
        <div style="flex:1"><div style="font-size:13px;font-weight:700">Letzter Fehler${S.lastErrorName?(" · "+E(S.lastErrorName)):""}</div><div style="font-size:12.5px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace">${E(S.lastError)}</div></div>
        <span style="font-size:11.5px;color:var(--faint);font-family:'JetBrains Mono',monospace">${E(S.lastErrorTime||"")}</span></div>`;
    }
    const fdefs=[["all","Alle",k.total||0],["up","OK",up],["down","Ausfälle",down],["warning","Langsam",warn]];
    html+=`<div style="display:flex;gap:8px;margin-bottom:14px">${fdefs.map(([id,label,c])=>{const a=ui.filter===id;return `<button data-filter="${id}" style="display:flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid ${a?'color-mix(in srgb,var(--accent) 35%,var(--border))':'var(--border)'};border-radius:9px;background:${a?'var(--accent-soft)':'var(--surface)'};color:${a?'var(--accent-ink)':'var(--muted)'};cursor:pointer;font-size:12.5px;font-weight:600">${label}<span style="font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.7">${c}</span></button>`;}).join("")}</div>`;
  }
  const list=sectionList();
  const cols="88px minmax(0,1.6fr) minmax(0,1.3fr) 104px 78px 108px 116px";
  const hc="overflow:hidden;text-overflow:ellipsis;white-space:nowrap";
  html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 2px var(--shadow);overflow:hidden">
    <div style="display:grid;grid-template-columns:${cols};align-items:center;padding:12px 16px;background:var(--surface-2);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)">
      <div style="${hc}">Typ</div><div style="${hc}">Name</div><div style="${hc}">Ziel</div><div style="${hc}">Status</div><div style="${hc}">Antwort</div><div style="${hc}">Letzter Check</div><div style="text-align:right;${hc}">Aktionen</div></div>
    ${list.map(m=>{const t=TYPES[m.type]||{label:m.type,icon:"lan"};const st=SECT[m.state]||SECT.unknown;
      const resp=m.responseMs!=null?(m.responseMs+" ms"):"—";
      const respColor=m.state==="down"?"var(--down)":m.state==="warning"?"var(--warn)":"var(--text)";
      return `<div class="trow" style="display:grid;grid-template-columns:${cols};align-items:center;padding:11px 16px;border-top:1px solid var(--border);font-size:13px${m.enabled?'':';opacity:.55'}">
        <div style="display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;font-weight:500">${ic(t.icon,16,"color:var(--faint)")}${t.label}</div>
        <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px">${E(m.name)}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px">${E(m.target||"")}</div>
        <div><span style="display:inline-flex;align-items:center;gap:6px;padding:3px 9px 3px 8px;border-radius:999px;background:${st.soft};color:${st.fg};font-size:11.5px;font-weight:700"><span style="width:6px;height:6px;border-radius:50%;background:${st.dot}"></span>${st.txt}</span></div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:12.5px;color:${respColor}">${resp}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);${hc}" title="Nächste: ${E(m.nextRun||'—')}">${E(m.lastRun||"—")}</div>
        <div class="rowact">
          <button class="iconbtn" data-act="test" data-id="${E(m.id)}" title="Testen">${ic("science",15)}</button>
          <button class="iconbtn" data-act="toggle" data-id="${E(m.id)}" title="${m.enabled?'Deaktivieren':'Aktivieren'}">${ic(m.enabled?"toggle_on":"toggle_off",16)}</button>
          <button class="iconbtn" data-act="edit" data-id="${E(m.id)}" title="Bearbeiten">${ic("edit",15)}</button>
          <button class="iconbtn dz" data-act="delete" data-id="${E(m.id)}" title="Löschen">${ic("delete",15)}</button>
        </div></div>`;}).join("")}
    ${list.length===0?`<div style="padding:46px;text-align:center;color:var(--faint);font-size:13px">${(S.monitors||[]).length?'Keine Monitore gefunden.':'Noch keine Monitore — füge mit „Hinzufügen“ den ersten Eintrag hinzu.'}</div>`:""}
  </div>`;
  return html;
}
function kpiCard(icon,label,val,sub,valColor,icColor){
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px var(--shadow)">
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--muted)">${ic(icon,18,"color:"+icColor)}${label}</div>
    <div style="font-size:30px;font-weight:700;margin-top:8px;letter-spacing:-.02em;color:${valColor}">${E(val)}</div>
    <div style="font-size:11.5px;color:var(--faint);margin-top:2px">${E(sub)}</div></div>`;
}

function renderLogs(){
  const logs=S.logs||[];
  const lc={INFO:"var(--accent-ink)",WARN:"var(--warn)",WARNUNG:"var(--warn)",ERROR:"var(--down)",FEHLER:"var(--down)",DEBUG:"var(--faint)"};
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 2px var(--shadow);overflow:hidden">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface-2);border-bottom:1px solid var(--border)">${ic("terminal",18,"color:var(--faint)")}<span style="font-size:12.5px;font-weight:600">agent.log</span><span style="font-size:11.5px;color:var(--faint);font-family:'JetBrains Mono',monospace">Log-Level: ${E((S.settings&&S.settings.logLevel)||"Info")}</span><div style="flex:1"></div><button id="btnOpenLogs" style="display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted);padding:5px 10px;cursor:pointer;font-size:11.5px;font-weight:600">${ic("folder_open",15)}Ordner</button><span style="font-size:11.5px;color:var(--faint);margin-left:10px">${logs.length} Einträge</span></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:12.5px;max-height:none">
    ${logs.length?logs.map(l=>`<div style="display:flex;align-items:baseline;gap:14px;padding:9px 16px;border-top:1px solid var(--border)"><span style="color:var(--faint);flex:0 0 auto">${E(l.time)}</span><span style="flex:0 0 64px;font-weight:600;color:${lc[(l.level||"").toUpperCase()]||"var(--muted)"}">${E(l.level)}</span><span style="color:var(--text);line-height:1.5;word-break:break-word">${E(l.msg)}</span></div>`).join(""):'<div style="padding:40px;text-align:center;color:var(--faint)">Keine Logeinträge.</div>'}
    </div></div>`;
}

function renderSettings(){
  const g=S.settings||{},w=S.watchdog||{};
  const tgl=(label,on,key)=>`<button class="tg" data-set="${key}"><span style="font-size:12.5px;font-weight:500">${label}</span><span class="tgk" style="background:${on?'var(--accent)':'var(--border)'}"><i style="left:${on?'18px':'2px'}"></i></span></button>`;
  const inp=(label,key,val,mono)=>`<label class="fld${mono?' mono':''}"><span>${label}</span><input data-g="${key}" value="${E(val)}"></label>`;
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 2px var(--shadow);padding:20px 22px">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:18px">${ic("tune",20,"color:var(--accent-ink)")}<h2 style="margin:0;font-size:15px;font-weight:700">Globale Einstellungen</h2></div>
      <div class="g2" style="margin-bottom:16px">
        ${inp("Standard-Intervall (s)","defaultIntervalSeconds",g.defaultIntervalSeconds,1)}
        ${inp("HTTP-Timeout (ms)","httpTimeoutMs",g.httpTimeoutMs,1)}
        ${inp("TCP-Timeout (ms)","tcpTimeoutMs",g.tcpTimeoutMs,1)}
        ${inp("Ping-Timeout (ms)","pingTimeoutMs",g.pingTimeoutMs,1)}
        <label class="fld"><span>Log-Level</span><select data-g="logLevel">${["Info","Debug","Warnung","Fehler"].map(o=>`<option ${g.logLevel===o?"selected":""}>${o}</option>`).join("")}</select></label>
        <label class="fld"><span>Sprache</span><select data-g="language">${[["System","System"],["en","English"],["de","Deutsch"],["pl","Polski"]].map(([v,t])=>`<option value="${v}" ${g.language===v?"selected":""}>${t}</option>`).join("")}</select></label>
      </div>
      <div class="g2">
        ${tgl("Push-URLs maskieren",g.maskPushUrls,"maskPushUrls")}
        ${tgl("Autostart aktivieren",g.autostart,"autostart")}
        ${tgl("Start minimiert",g.startMinimized,"startMinimized")}
        ${tgl("Beim Schließen in Tray",g.minimizeToTrayOnClose,"minimizeToTrayOnClose")}
        ${tgl("Maschineninfos mitsenden",g.sendMachineInfo,"sendMachineInfo")}
        ${tgl("Monitoring automatisch starten",g.monitoringAutoStart,"monitoringAutoStart")}
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btnp" id="btnSaveSettings">${ic("save",18)}Speichern</button>
        <button class="btns" id="btnOpenConfig">${ic("folder_open",18)}Konfiguration öffnen</button>
        <button class="btns" id="btnUpdates">${ic("system_update_alt",18)}Updates</button>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 2px var(--shadow);padding:20px 22px">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:18px">${ic("security",20,"color:var(--accent-ink)")}<h2 style="margin:0;font-size:15px;font-weight:700">Watchdog</h2></div>
      <button class="tg" data-wd="enabled" style="margin-bottom:16px;padding:13px 14px"><span><span style="display:block;font-size:13px;font-weight:600">Watchdog aktiv</span><span style="display:block;font-size:11.5px;color:var(--muted);margin-top:1px">Push, falls der Agent stillsteht</span></span><span class="tgk" style="width:42px;height:24px;background:${w.enabled?'var(--accent)':'var(--border)'}"><i style="width:20px;height:20px;left:${w.enabled?'20px':'2px'}"></i></span></button>
      <label class="fld mono"><span>Watchdog-Push-URL</span><input data-w="pushUrl" value="${E(w.pushUrl||'')}" placeholder="https://kuma.local/api/push/…"></label>
      <div class="g2" style="margin-bottom:4px">
        <label class="fld mono"><span>Intervall (s)</span><input data-w="intervalSeconds" value="${E(w.intervalSeconds||60)}"></label>
        <label class="fld mono"><span>Max. ohne Erfolg (s)</span><input data-w="maxSecondsWithoutSuccessfulCheck" value="${E(w.maxSecondsWithoutSuccessfulCheck||300)}"></label>
      </div>
      <button class="tg" data-wd="sendMachineInfo"><span style="font-size:12.5px;font-weight:500">Maschineninfos mitsenden</span><span class="tgk" style="background:${w.sendMachineInfo?'var(--accent)':'var(--border)'}"><i style="left:${w.sendMachineInfo?'18px':'2px'}"></i></span></button>
      <div style="display:flex;gap:10px;margin-top:20px"><button class="btnp" id="btnSaveSettings2">${ic("save",18)}Speichern</button></div>
    </div>
  </div>`;
}

/* ---- interactions ---- */
function wire(){
  const root=document.getElementById("root");
  const tb=document.getElementById("titlebar");
  tb.addEventListener("mousedown",e=>{if(e.button!==0)return;if(e.target.closest("button,[data-nodrag]"))return;post({type:"window",action:"drag"});});
  tb.addEventListener("dblclick",e=>{if(e.target.closest("button,[data-nodrag]"))return;post({type:"window",action:"maximize"});});
  document.getElementById("btnMin").onclick=()=>post({type:"window",action:"minimize"});
  document.getElementById("btnMax").onclick=()=>post({type:"window",action:"maximize"});
  document.getElementById("btnClose").onclick=()=>post({type:"window",action:"close"});
  document.getElementById("btnTheme").onclick=()=>{S.theme=theme()==="dark"?"light":"dark";cmd("setTheme",{theme:S.theme});render();};
  root.querySelectorAll("[data-layout]").forEach(b=>b.onclick=()=>{ui.layout=b.dataset.layout;localStorage.setItem("uk_layout",ui.layout);render();});
  root.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>{ui.section=b.dataset.nav;ui.query="";ui.filter="all";localStorage.setItem("uk_section",ui.section);render();});
  const mon=document.getElementById("btnMon");if(mon)mon.onclick=()=>cmd("toggleMonitoring");
  const test=document.getElementById("btnTest");if(test)test.onclick=()=>cmd("testAll");
  const add=document.getElementById("btnAdd");if(add)add.onclick=()=>openModal(null);
  const search=document.getElementById("search");if(search)search.oninput=e=>{ui.query=e.target.value;render();const s2=document.getElementById("search");if(s2){s2.focus();s2.setSelectionRange(s2.value.length,s2.value.length);}};
  root.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{ui.filter=b.dataset.filter;render();});
  root.querySelectorAll("[data-act]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id,m=(S.monitors||[]).find(x=>x.id===id);
    if(b.dataset.act==="test")cmd("testMonitor",{id});
    else if(b.dataset.act==="toggle")cmd("toggleMonitor",{id});
    else if(b.dataset.act==="edit"&&m)openModal(m);
    else if(b.dataset.act==="delete")cmd("deleteMonitor",{id});
  });
  // settings
  const ol=document.getElementById("btnOpenLogs");if(ol)ol.onclick=()=>cmd("openLogs");
  const oc=document.getElementById("btnOpenConfig");if(oc)oc.onclick=()=>cmd("openConfig");
  const up=document.getElementById("btnUpdates");if(up)up.onclick=()=>cmd("checkUpdates");
  root.querySelectorAll("[data-set]").forEach(b=>b.onclick=()=>{S.settings[b.dataset.set]=!S.settings[b.dataset.set];render();});
  root.querySelectorAll("[data-wd]").forEach(b=>b.onclick=()=>{S.watchdog[b.dataset.wd]=!S.watchdog[b.dataset.wd];render();});
  root.querySelectorAll("[data-g]").forEach(i=>i.onchange=()=>{S.settings[i.dataset.g]=i.value;});
  root.querySelectorAll("[data-w]").forEach(i=>i.onchange=()=>{S.watchdog[i.dataset.w]=i.value;});
  const ss=()=>{collectSettings();cmd("saveSettings",{settings:S.settings,watchdog:S.watchdog});toast("Einstellungen gespeichert","ok");};
  const s1=document.getElementById("btnSaveSettings");if(s1)s1.onclick=ss;
  const s2=document.getElementById("btnSaveSettings2");if(s2)s2.onclick=ss;
}
function collectSettings(){
  document.querySelectorAll("[data-g]").forEach(i=>{S.settings[i.dataset.g]=i.value;});
  document.querySelectorAll("[data-w]").forEach(i=>{S.watchdog[i.dataset.w]=i.value;});
}

/* ---- modal ---- */
const FT={ping:["host","timeout"],tcp:["host","port","timeout"],service:["serviceName","expectedStatus","restartIfStopped"],drive:["path","minPct","minGb","reconnect"]};
function field(id,label,val,opts){opts=opts||{};
  const types=opts.types?` data-mf="${opts.types}"`:"";
  if(opts.select)return `<label class="fld"${types}><span>${label}</span><select id="${id}">${opts.select.map(o=>`<option ${String(val)===String(o)?"selected":""}>${o}</option>`).join("")}</select></label>`;
  if(opts.check)return `<label class="tg"${types} style="margin-bottom:13px"><span style="font-size:12.5px;font-weight:500">${label}</span><span class="tgk" id="${id}_k" style="background:${val?'var(--accent)':'var(--border)'}"><i style="left:${val?'18px':'2px'}"></i></span><input type="checkbox" id="${id}" ${val?"checked":""} style="display:none"></label>`;
  if(opts.area)return `<label class="fld"${types}><span>${label}</span><textarea id="${id}" placeholder="${opts.ph||""}">${E(val||"")}</textarea></label>`;
  return `<label class="fld${opts.mono?' mono':''}"${types}><span>${label}</span><input id="${id}" type="${opts.num?'number':'text'}" value="${E(val==null?'':val)}" placeholder="${opts.ph||''}"></label>`;
}
function fillServicePicker(){
  const sel=document.getElementById("m_svcpick");
  if(!sel)return;
  if(!svcCache){sel.innerHTML='<option value="">— Installierte Dienste werden geladen… —</option>';return;}
  const inp=document.getElementById("m_serviceName");
  const cur=inp?inp.value:"";
  sel.innerHTML='<option value="">— Aus installierter Dienstliste wählen —</option>'+
    svcCache.map(s=>`<option value="${E(s.serviceName)}"${String(s.serviceName)===String(cur)?" selected":""}>${E(s.displayName||s.serviceName)} (${E(s.serviceName)})${s.status?" · "+E(s.status):""}</option>`).join("");
  sel.onchange=()=>{const i=document.getElementById("m_serviceName");if(i&&sel.value)i.value=sel.value;};
}
function openModal(m){
  const edit=!!m,t=edit?m.type:"ping";m=m||{};
  const html=`<div class="modal"><div class="mh"><div style="display:flex;align-items:center;gap:10px">${ic(edit?"edit":"add",20,"color:var(--accent-ink)")}<h2 style="margin:0;font-size:16px;font-weight:700">${edit?"Monitor bearbeiten":"Monitor hinzufügen"}</h2></div><button class="winbtn" id="mClose">${ic("close",18)}</button></div>
  <div class="mb">
    <div id="mErr" style="display:none;color:var(--down);font-size:12.5px;margin-bottom:12px;font-weight:600"></div>
    <input type="hidden" id="m_id" value="${E(m.id||"")}">
    ${edit?`<input type="hidden" id="m_type" value="${t}">`:field("m_type","Typ",t,{select:["ping","tcp","service","drive"]})}
    ${field("m_name","Name",m.name,{ph:"Anzeigename"})}
    ${field("m_host","Host / IP",m.host,{types:"ping tcp",mono:1,ph:"z. B. 192.168.1.1"})}
    ${field("m_port","Port",m.port||443,{types:"tcp",num:1,mono:1})}
    <div data-mf="service"><label class="fld"><span>Dienst aus Liste wählen</span><select id="m_svcpick"><option value="">— Installierte Dienste werden geladen… —</option></select></label>${field("m_serviceName","Dienstname",m.serviceName,{mono:1,ph:"z. B. Spooler"})}</div>
    ${field("m_expectedStatus","Erwarteter Status",m.expectedStatus||"Running",{types:"service",select:["Running","Stopped","Paused","StartPending","StopPending","ContinuePending","PausePending"]})}
    ${field("m_path","Pfad / Laufwerk",m.path,{types:"drive",mono:1,ph:"C:\\ oder \\\\server\\freigabe"})}
    <div data-mf="drive" class="g2">${field("m_minPct","Min. frei (%)",m.minimumFreePercent!=null?m.minimumFreePercent:10,{num:1,mono:1})}${field("m_minGb","Min. frei (GB)",m.minimumFreeGb!=null?m.minimumFreeGb:0,{num:1,mono:1})}</div>
    <div class="g2">${field("m_interval","Intervall (s)",m.intervalSeconds||(S.defaults&&S.defaults.intervalSeconds)||30,{num:1,mono:1})}${field("m_timeout","Timeout (ms)",m.timeoutMs||3000,{types:"ping tcp",num:1,mono:1})}</div>
    ${field("m_pushUrl","Push-URL (optional)",m.pushUrl,{mono:1,ph:"https://kuma.local/api/push/…"})}
    ${field("m_restartIfStopped","Dienst bei Stopp automatisch starten",!!m.restartIfStopped,{types:"service",check:1})}
    ${field("m_reconnect","Bei Nichterreichbarkeit neu verbinden",!!m.reconnectIfUnavailable,{types:"drive",check:1})}
    <details style="margin:6px 0 12px"><summary style="cursor:pointer;font-size:12.5px;font-weight:700;color:var(--muted)">Erweitert</summary><div style="margin-top:12px">
      ${field("m_restartServices","Dienste bei Fehler neu starten (Komma-getrennt)",(m.restartServicesOnFailure||[]).join(", "),{ph:"Dienst1, Dienst2"})}
      ${field("m_cooldown","Neustart-Cooldown (s)",m.restartServicesCooldownSeconds||300,{num:1,mono:1})}
      ${field("m_note","Notiz",m.note,{area:1,ph:"Interne Notiz…"})}
    </div></details>
    ${field("m_enabled","Aktiv",m.enabled!==false,{check:1})}
    ${field("m_sendMachineInfo","Maschineninfos mitsenden",m.sendMachineInfo!==false,{check:1})}
  </div>
  <div class="mf"><button class="btns" id="mCancel">Abbrechen</button><button class="btnp" id="mSave">${ic("save",18)}Speichern</button></div></div>`;
  const ov=document.createElement("div");ov.className="ov show";ov.id="overlay";ov.innerHTML=html;document.body.appendChild(ov);
  const syncT=()=>{const tp=(document.getElementById("m_type").value);ov.querySelectorAll("[data-mf]").forEach(el=>{el.classList.toggle("hidden",el.dataset.mf.split(" ").indexOf(tp)===-1);});if(tp==="service"){fillServicePicker();if(!svcCache)cmd("listServices");}};
  const tsel=document.getElementById("m_type");if(tsel&&tsel.tagName==="SELECT")tsel.onchange=syncT;syncT();
  ov.querySelectorAll(".tgk").forEach(k=>{const lab=k.closest("label");if(!lab)return;const cb=lab.querySelector('input[type=checkbox]');if(!cb)return;lab.style.cursor="pointer";lab.onclick=e=>{e.preventDefault();cb.checked=!cb.checked;k.style.background=cb.checked?"var(--accent)":"var(--border)";k.querySelector("i").style.left=cb.checked?"18px":"2px";};});
  const close=()=>ov.remove();
  document.getElementById("mClose").onclick=close;document.getElementById("mCancel").onclick=close;
  ov.addEventListener("mousedown",e=>{if(e.target===ov)close();});
  document.getElementById("mSave").onclick=()=>{
    const v=id=>{const el=document.getElementById(id);return el?el.value.trim():"";};
    const n=id=>{const x=parseFloat(v(id));return isNaN(x)?0:x;};
    const c=id=>{const el=document.getElementById(id);return!!(el&&el.checked);};
    const tp=document.getElementById("m_type").value;
    const err=msg=>{const e=document.getElementById("mErr");e.textContent=msg;e.style.display="block";};
    const mon={id:v("m_id")||null,type:tp,name:v("m_name"),intervalSeconds:Math.round(n("m_interval")),pushUrl:v("m_pushUrl"),note:v("m_note"),enabled:c("m_enabled"),sendMachineInfo:c("m_sendMachineInfo"),
      restartServicesOnFailure:v("m_restartServices").split(",").map(s=>s.trim()).filter(Boolean),restartServicesCooldownSeconds:Math.round(n("m_cooldown"))};
    if(tp==="ping"||tp==="tcp"){mon.host=v("m_host");mon.timeoutMs=Math.round(n("m_timeout"));if(!mon.host)return err("Bitte Host / IP angeben.");}
    if(tp==="tcp"){mon.port=Math.round(n("m_port"));if(mon.port<1||mon.port>65535)return err("Port 1–65535.");}
    if(tp==="service"){mon.serviceName=v("m_serviceName");mon.expectedStatus=v("m_expectedStatus");mon.restartIfStopped=c("m_restartIfStopped");if(!mon.serviceName)return err("Bitte Dienstnamen angeben.");}
    if(tp==="drive"){mon.path=v("m_path");mon.minimumFreePercent=Math.round(n("m_minPct"));mon.minimumFreeGb=n("m_minGb");mon.reconnectIfUnavailable=c("m_reconnect");if(!mon.path)return err("Bitte Pfad / Laufwerk angeben.");}
    if(!mon.name)mon.name=mon.host||mon.serviceName||mon.path||mon.type;
    cmd("saveMonitor",{monitor:mon});close();toast(mon.id?"Monitor aktualisiert":"Monitor hinzugefügt","ok");
  };
}

/* ---- toast ---- */
let tt=null;
function toast(msg,kind){const el=document.getElementById("toast");el.innerHTML=ic(kind==="err"?"error":"check_circle",17)+E(msg);el.className=(kind||"")+" show";clearTimeout(tt);tt=setTimeout(()=>el.className="",3000);}

/* ---- bridge ---- */
let lastSig=null;
window.agent={
  applyState:s=>{
    if(!s)return;
    // Skip re-rendering when the incoming state is byte-for-byte identical to what we
    // already show. The host pushes a full snapshot ~every 1.5s; without this guard the
    // table rebuilds constantly and flickers/"blinks" under the mouse.
    const sig=JSON.stringify(s);
    // Preserve in-progress edits while the user is on the settings tab or a modal is open.
    const keepSettings=ui.section==="settings"&&S.settings;
    const prevS=S.settings,prevW=S.watchdog;
    S=s;
    if(keepSettings){S.settings=prevS;S.watchdog=prevW;}
    document.body.classList.toggle("max",!!S.maximized);
    // Don't clobber an open modal or a focused input/select (search, settings fields).
    if(document.getElementById("overlay"))return;
    const a=document.activeElement;
    if(a&&/^(INPUT|SELECT|TEXTAREA)$/.test(a.tagName)&&document.getElementById("root").contains(a))return;
    if(sig===lastSig)return;
    lastSig=sig;
    render();
  },
  toast:(m,e)=>toast(m,e?"err":"ok"),
  services:list=>{svcCache=Array.isArray(list)?list:[];if(document.getElementById("m_svcpick"))fillServicePicker();}
};
document.addEventListener("keydown",e=>{if(e.key==="Escape"){const o=document.getElementById("overlay");if(o)o.remove();}});
document.querySelectorAll(".rz").forEach(rz=>rz.addEventListener("mousedown",e=>{if(e.button!==0)return;e.preventDefault();post({type:"window",action:"resize",edge:rz.dataset.edge});}));
render();
cmd("ready");
})();
</script>
